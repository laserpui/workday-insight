<!doctype html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#5b5ce2">
  <title>Workday Insight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <?!= include('Styles'); ?>
</head>
<body>
  <div class="ambient a"></div>
  <div class="ambient b"></div>

  <div class="app-shell">
    <aside class="sidebar glass">
      <div class="brand">
        <span class="brand-icon">W</span>
        <span><strong>Workday</strong><br>Insight</span>
      </div>
      <nav aria-label="เมนูหลัก">
        <button class="nav active" data-view="dashboard"><i data-lucide="layout-dashboard"></i><span>ภาพรวม</span></button>
        <button class="nav" data-view="employees"><i data-lucide="users"></i><span>พนักงาน</span></button>
        <button class="nav" data-view="records"><i data-lucide="clipboard-list"></i><span>รายการ</span></button>
      </nav>
      <div class="sidebar-foot"><i data-lucide="shield-check"></i><span>ข้อมูลบันทึกใน Google Sheets</span></div>
    </aside>

    <main class="content">
      <header>
        <div>
          <p class="eyebrow">ATTENDANCE & LEAVE</p>
          <h1 id="pageTitle">ภาพรวมการทำงาน</h1>
        </div>
        <div class="header-actions">
          <button class="btn outline" type="button" onclick="exportCsv()"><i data-lucide="download"></i><span>ส่งออก</span></button>
          <button class="btn primary" type="button" onclick="openModal('recordModal')"><i data-lucide="plus"></i><span>เพิ่มข้อมูล</span></button>
        </div>
      </header>

      <section class="filter-bar glass" aria-label="ตัวกรองข้อมูล">
        <div class="filter-label"><i data-lucide="calendar-range"></i><span>ช่วงเวลา</span></div>
        <label><span>ตั้งแต่</span><input id="startDateFilter" type="date" aria-label="วันเริ่มต้น"></label>
        <span class="range-separator">ถึง</span>
        <label><span>จนถึง</span><input id="endDateFilter" type="date" aria-label="วันสิ้นสุด"></label>
        <label class="employee-filter"><span>พนักงาน</span>
          <select id="employeeFilter" aria-label="เลือกพนักงาน">
            <option value="">พนักงานทุกคน</option>
          </select>
        </label>
        <button class="btn primary filter-apply" type="button" onclick="load()"><i data-lucide="search"></i><span>แสดงผล</span></button>
      </section>

      <section id="dashboard" class="view active" aria-live="polite"></section>
      <section id="employees" class="view" aria-live="polite"></section>
      <section id="records" class="view" aria-live="polite"></section>
    </main>
  </div>

  <div class="modal" id="recordModal" role="dialog" aria-modal="true" aria-labelledby="recordModalTitle">
    <div class="modal-card glass">
      <button class="close" type="button" aria-label="ปิด" onclick="closeModal('recordModal')">×</button>
      <p class="eyebrow">NEW RECORD</p>
      <h2 id="recordModalTitle">เพิ่มข้อมูล</h2>
      <div class="tab-row" role="tablist">
        <button class="tab active" type="button" data-form="employeeForm">พนักงาน</button>
        <button class="tab" type="button" data-form="attendanceForm">เวลาสาย</button>
        <button class="tab" type="button" data-form="leaveForm">วันลา</button>
      </div>

      <form id="employeeForm" class="form active" onsubmit="saveEmployee(event)">
        <label>ชื่อ-นามสกุล<input name="name" required autocomplete="name" placeholder="ชื่อพนักงาน"></label>
        <label>วันที่เริ่มงาน<input name="startDate" type="date" required></label>
        <button class="btn primary" type="submit"><i data-lucide="save"></i>บันทึกพนักงาน</button>
      </form>

      <form id="attendanceForm" class="form" onsubmit="saveAttendance(event)">
        <label>พนักงาน<select class="employee-select" name="employeeId" required></select></label>
        <label>เดือน<input name="month" type="month" required></label>
        <label>เวลาสายรวมทั้งเดือน (นาที)<input name="lateMinutes" type="number" min="0" step="1" value="0" required><small class="field-hint">ระบบคำนวณคะแนนให้อัตโนมัติ: 0–29 = 100, 30–59 = 90, 60–89 = 80, 90–119 = 70 และ 120 นาทีขึ้นไป = 60 คะแนน</small></label>
        <button class="btn primary" type="submit"><i data-lucide="save"></i>บันทึกยอดรวมรายเดือน</button>
      </form>

      <form id="leaveForm" class="form" onsubmit="saveLeave(event)">
        <label>พนักงาน<select class="employee-select" name="employeeId" required></select></label>
        <label>วันที่<input name="date" type="date" required></label>
        <label>ประเภทการลา
          <select name="type" required>
            <option value="sick">ลาป่วย</option>
            <option value="personal">ลากิจ</option>
            <option value="vacation">พักร้อน</option>
            <option value="other">ลาอื่น ๆ</option>
          </select>
        </label>
        <label>จำนวนวัน<input name="days" type="number" min="0.5" step="0.5" value="1" required></label>
        <label>หมายเหตุ<textarea name="note" rows="2" placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)"></textarea></label>
        <button class="btn primary" type="submit"><i data-lucide="save"></i>บันทึกวันลา</button>
      </form>
    </div>
  </div>

  <div class="modal" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
    <div class="modal-card glass">
      <button class="close" type="button" aria-label="ปิด" onclick="closeModal('editModal')">×</button>
      <p class="eyebrow">EDIT RECORD</p>
      <h2 id="editModalTitle">แก้ไขข้อมูล</h2>
      <form id="editForm" class="form active"></form>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="loading" class="loading" aria-hidden="true"><span></span></div>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <?!= include('Scripts'); ?>
</body>
</html>
