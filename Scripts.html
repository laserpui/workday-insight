<script>
let data={employees:[],summary:{}};const today=new Date().toISOString().slice(0,10);
document.addEventListener('DOMContentLoaded',()=>{const y=new Date().getFullYear(),s=document.querySelector('#yearSelect');[y-1,y,y+1].forEach(n=>s.add(new Option(n,n,n===y,n===y)));s.onchange=load;document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>showView(b.dataset.view,b));document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchForm(b));document.querySelectorAll('input[type=date]').forEach(e=>e.value=today);load();lucide.createIcons()});
function load(){google.script.run.withSuccessHandler(r=>{data=r;render();}).withFailureHandler(()=>{data=sample();render();toast('กำลังแสดงข้อมูลตัวอย่าง');}).getDashboardData(yearSelect.value)}
function sample(){return {employees:[{id:'E001',name:'กัญญารัตน์ รุ่งเรือง',startDate:'2021-02-15',lateMinutes:18,used:{sick:2,personal:1,vacation:3,other:0},remaining:{sick:28,personal:4,vacation:5},vacationEntitlement:8},{id:'E002',name:'ณัฐพล ใจดี',startDate:'2024-06-01',lateMinutes:72,used:{sick:0,personal:2,vacation:0,other:1},remaining:{sick:30,personal:3,vacation:0},vacationEntitlement:0},{id:'E003',name:'พิมพ์ชนก วัฒนกุล',startDate:'2018-04-10',lateMinutes:35,used:{sick:4,personal:0,vacation:6,other:0},remaining:{sick:26,personal:5,vacation:4},vacationEntitlement:10}],summary:{total:3,lateMinutes:125,leaveDays:19,atRisk:1}}}
function render(){renderDashboard();renderEmployees();renderRecords();renderAi();fillEmployees();lucide.createIcons()}
function metric(icon,label,value,sub){return `<article class="metric glass"><div class="metric-top"><span>${label}</span><span class="metric-icon"><i data-lucide="${icon}"></i></span></div><strong>${value}</strong><small>${sub}</small></article>`}
function renderDashboard(){let s=data.summary,e=data.employees;dashboard.innerHTML=`<div class="metrics">${metric('users','พนักงานทั้งหมด',s.total||0,'เรียงตามตัวอักษร')}${metric('clock-3','เวลาสายสะสม',`${s.lateMinutes||0} นาที`,'ภายในปีที่เลือก')}${metric('calendar-days','วันลาที่ใช้',`${s.leaveDays||0} วัน`,'ทุกประเภทการลา')}${metric('triangle-alert','ต้องติดตาม',s.atRisk||0,'สายตั้งแต่ 60 นาที')}</div><div class="grid"><section class="panel glass"><div class="panel-head"><h2>เวลาสายรายบุคคล</h2><span class="tag">นาที / ปี</span></div>${e.length?`<div class="bar-list">${e.map(x=>`<div class="bar-row"><b>${x.name}</b><div class="bar"><span style="width:${Math.min(100,x.lateMinutes/120*100)}%"></span></div><b>${x.lateMinutes}</b></div>`).join('')}</div>`:'<p class="empty">ยังไม่มีข้อมูลพนักงาน</p>'}</section><section class="panel glass"><div class="panel-head"><h2>ภาพรวมสิทธิ์ลา</h2></div><div class="leave-summary">${['sick|ลาป่วย|30 วัน / ปี','personal|ลากิจ|5 วัน / ปี','vacation|พักร้อน|ตัดรอบ 1 ม.ค.'].map(x=>{let[a,b,c]=x.split('|'),n=e.reduce((v,i)=>v+(i.remaining[a]||0),0);return `<div class="leave-item"><span>${b}<small> · ${c}</small></span><b>${n} วัน</b></div>`}).join('')}</div></section></div>`}
function renderEmployees(){employees.innerHTML=`<section class="panel glass"><div class="panel-head"><h2>รายชื่อพนักงาน</h2><span class="tag">${data.employees.length} คน</span></div><div class="table-wrap"><table class="data-table"><thead><tr><th>พนักงาน</th><th>เริ่มงาน</th><th>สาย</th><th>ลาป่วยคงเหลือ</th><th>ลากิจคงเหลือ</th><th>พักร้อนคงเหลือ</th></tr></thead><tbody>${data.employees.map(e=>`<tr><td class="person">${e.name}</td><td>${e.startDate}</td><td><span class="pill">${e.lateMinutes} นาที</span></td><td>${e.remaining.sick} วัน</td><td>${e.remaining.personal} วัน</td><td>${e.remaining.vacation} / ${e.vacationEntitlement} วัน</td></tr>`).join('')||'<tr><td colspan="6" class="empty">เพิ่มรายชื่อพนักงานเพื่อเริ่มต้น</td></tr>'}</tbody></table></div></section>`}
function renderRecords(){records.innerHTML=`<section class="panel glass"><h2>บันทึกข้อมูลการทำงาน</h2><p class="empty">เลือก “เพิ่มข้อมูล” เพื่อเพิ่มพนักงาน บันทึกเวลาสาย หรือบันทึกวันลา ข้อมูลจะถูกเก็บใน Google Sheet ของคุณ</p><button class="btn primary" onclick="openModal('recordModal')"><i data-lucide="clipboard-plus"></i> เพิ่มรายการ</button></section>`}
function renderAi(){let risky=data.employees.filter(e=>e.lateMinutes>=60);ai.innerHTML=`<section class="ai-card"><p class="eyebrow" style="color:#fff">AI PERFORMANCE INSIGHT</p><h2>สรุปแนวโน้มประจำปี ${yearSelect.value}</h2><p>ระบบจะประเมินจากเวลาสายและการลา เพื่อช่วยหัวหน้างานวางแผนการดูแลทีมอย่างเป็นธรรม</p><ul class="ai-list"><li>📊 ภาพรวม: ทีมมีเวลาสายสะสม ${data.summary.lateMinutes||0} นาที และใช้วันลา ${data.summary.leaveDays||0} วัน</li><li>🔎 สาเหตุที่ควรติดตาม: ${risky.length?risky.map(e=>e.name).join(', ')+' มีเวลาสายเกินเกณฑ์ 60 นาที':'ยังไม่พบพนักงานที่มีเวลาสายเกินเกณฑ์'}</li><li>✅ แนวทาง: นัดพูดคุยรายบุคคล ตรวจสอบอุปสรรคการเดินทาง และติดตามผลในรอบเดือนถัดไป</li></ul><button class="btn outline" onclick="toast('AI Insight สามารถต่อยอดด้วย Gemini API ได้')">ประเมินรายเดือน / ไตรมาส</button></section>`}
function fillEmployees(){document.querySelectorAll('.employee-select').forEach(s=>s.innerHTML='<option value="">เลือกพนักงาน</option>'+data.employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join(''))}
function showView(id,btn){document.querySelectorAll('.view,.nav').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');(btn||document.querySelector(`[data-view=${id}]`)).classList.add('active');pageTitle.textContent={dashboard:'ภาพรวมการทำงาน',employees:'ข้อมูลพนักงาน',records:'บันทึกข้อมูล',ai:'AI Insight'}[id];lucide.createIcons()}
function openModal(id){document.getElementById(id).classList.add('open')}function closeModal(id){document.getElementById(id).classList.remove('open')}function switchForm(b){document.querySelectorAll('.tab,.form').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.form).classList.add('active')}
function saveEmployee(ev){ev.preventDefault();submit('addEmployee',Object.fromEntries(new FormData(ev.target)),ev.target)}function saveAttendance(ev){ev.preventDefault();submit('addAttendance',Object.fromEntries(new FormData(ev.target)),ev.target)}function saveLeave(ev){ev.preventDefault();submit('addLeave',Object.fromEntries(new FormData(ev.target)),ev.target)}
function submit(fn,payload,form){google.script.run.withSuccessHandler(r=>{data=r;render();closeModal('recordModal');form.reset();toast('บันทึกข้อมูลเรียบร้อย')}).withFailureHandler(e=>toast('บันทึกไม่สำเร็จ: '+e.message))[fn](payload)}
function exportCsv(){const rows=[['พนักงาน','เริ่มงาน','สาย (นาที)','ลาป่วยคงเหลือ','ลากิจคงเหลือ','พักร้อนคงเหลือ'],...data.employees.map(e=>[e.name,e.startDate,e.lateMinutes,e.remaining.sick,e.remaining.personal,e.remaining.vacation])];const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'}));a.download=`workday-insight-${yearSelect.value}.csv`;a.click();toast('Export ไฟล์สรุปแล้ว')}
function toast(m){const t=document.querySelector('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
</script>
