<script>
let data = { employeeOptions: [], employees: [], records: [], summary: {}, filters: {} };
let activeView = 'dashboard';
let chartMetric = 'late';
const byId = id => document.getElementById(id);

document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  byId('startDateFilter').value = localDate(new Date(now.getFullYear(), now.getMonth() - 5, 1));
  byId('endDateFilter').value = localDate(new Date(now.getFullYear(), now.getMonth() + 1, 0));
  document.querySelectorAll('input[type="date"]').forEach(input => {
    if (!input.value && input.name === 'date') input.value = localDate(now);
  });
  document.querySelectorAll('input[type="month"]').forEach(input => {
    if (!input.value) input.value = localMonth(now);
  });
  document.querySelectorAll('.nav').forEach(button => {
    button.addEventListener('click', () => showView(button.dataset.view, button));
  });
  document.querySelectorAll('.tab').forEach(button => {
    button.addEventListener('click', () => switchForm(button));
  });
  document.querySelectorAll('.modal').forEach(modal => {
    modal.addEventListener('click', event => {
      if (event.target === modal) closeModal(modal.id);
    });
  });
  document.addEventListener('keydown', event => {
    if (event.key === 'Escape') document.querySelectorAll('.modal.open').forEach(modal => closeModal(modal.id));
  });
  icons();
  load();
});

function load() {
  const filters = getFilters();
  if (filters.startDate > filters.endDate) {
    toast('วันเริ่มต้นต้องไม่เกินวันสิ้นสุด');
    return;
  }
  setLoading(true);
  if (!hasServer()) {
    setData(sample(filters));
    setLoading(false);
    toast('กำลังแสดงข้อมูลตัวอย่างในโหมดพรีวิว');
    return;
  }
  google.script.run
    .withSuccessHandler(result => {
      setData(result);
      setLoading(false);
    })
    .withFailureHandler(error => {
      setLoading(false);
      toast(errorMessage(error));
    })
    .getDashboardData(filters);
}

function setData(result) {
  data = result || data;
  syncFilters();
  render();
}

function getFilters() {
  return {
    startDate: byId('startDateFilter').value,
    endDate: byId('endDateFilter').value,
    employeeId: byId('employeeFilter').value
  };
}

function syncFilters() {
  if (data.filters) {
    byId('startDateFilter').value = data.filters.startDate || byId('startDateFilter').value;
    byId('endDateFilter').value = data.filters.endDate || byId('endDateFilter').value;
  }
  const selected = data.filters && data.filters.employeeId || '';
  byId('employeeFilter').innerHTML = '<option value="">พนักงานทุกคน</option>' +
    (data.employeeOptions || []).map(emp => '<option value="' + attr(emp.id) + '">' + esc(emp.name) + '</option>').join('');
  byId('employeeFilter').value = selected;
}

function render() {
  renderDashboard();
  renderEmployees();
  renderRecords();
  fillEmployees();
  icons();
}

function metric(icon, label, value, sub) {
  return '<article class="metric glass"><div class="metric-top"><span>' + label + '</span><span class="metric-icon"><i data-lucide="' + icon + '"></i></span></div><strong>' + value + '</strong><small>' + sub + '</small></article>';
}

function renderDashboard() {
  const summary = data.summary || {};
  const employees = data.employees || [];
  const metrics = [
    metric('users', 'พนักงานในมุมมอง', summary.total || 0, 'ตามตัวกรองที่เลือก'),
    metric('clock-3', 'เวลาสายสะสม', (summary.lateMinutes || 0) + ' นาที', periodText()),
    metric('calendar-days', 'วันลาที่ใช้', (summary.leaveDays || 0) + ' วัน', 'รวมทุกประเภทการลา'),
    metric('award', 'คะแนนเวลาสายเฉลี่ย', numberText(summary.attendanceScore) + ' / 100', 'เฉลี่ยคะแนนรายเดือน')
  ].join('');

  const personMax = Math.max(1, ...employees.map(emp => Number(emp.lateMinutes || 0)));
  const rankedEmployees = [...employees].sort((a, b) => Number(b.lateMinutes || 0) - Number(a.lateMinutes || 0));
  const bars = employees.length
    ? '<div class="bar-list">' + rankedEmployees.map((emp, index) =>
        '<button class="bar-row" type="button" onclick="filterEmployee(\'' + js(emp.id) + '\')" aria-label="กรองข้อมูลของ ' + attr(emp.name) + ' เวลาสาย ' + numberText(emp.lateMinutes) + ' นาที">' +
          '<span class="rank">' + (index + 1) + '</span><b title="' + attr(emp.name) + '">' + esc(emp.name) + '</b>' +
          '<span class="bar"><span style="width:' + Math.max(emp.lateMinutes ? 3 : 0, Math.min(100, emp.lateMinutes / personMax * 100)) + '%"></span></span>' +
          '<b>' + numberText(emp.lateMinutes) + '</b>' +
        '</button>'
      ).join('') + '</div>'
    : '<p class="empty">ไม่พบข้อมูลในช่วงเวลาที่เลือก</p>';

  const leaveTypes = [
    ['sick', 'ลาป่วย', 'สิทธิ์พื้นฐาน 30 วัน'],
    ['personal', 'ลากิจ', 'สิทธิ์พื้นฐาน 5 วัน'],
    ['vacation', 'พักร้อน', 'ตามอายุงาน']
  ];
  const leaveSummary = leaveTypes.map(item => {
    const total = employees.reduce((sum, emp) => sum + Number(emp.remaining[item[0]] || 0), 0);
    return '<div class="leave-item"><span>' + item[1] + '<small>' + item[2] + '</small></span><b>' + total + ' วัน</b></div>';
  }).join('');

  byId('dashboard').innerHTML =
    '<div class="metrics">' + metrics + '</div>' +
    renderMonthlyChart(employees) +
    '<div class="grid">' +
      '<section class="panel glass"><div class="panel-head"><div><h2>เวลาสายรายบุคคล</h2><p class="panel-subtitle">แตะชื่อเพื่อเจาะดูข้อมูลรายบุคคล</p></div><span class="tag">นาที / ช่วงเวลา</span></div>' + bars + '</section>' +
      '<section class="panel glass"><div class="panel-head"><h2>สิทธิ์ลาคงเหลือ</h2></div><div class="leave-summary">' + leaveSummary + '</div></section>' +
    '</div>';
}

function renderMonthlyChart(employees) {
  const months = clientMonths((data.filters || {}).startDate, (data.filters || {}).endDate);
  const monthly = months.map(month => {
    const rows = employees.map(emp => (emp.monthlyAttendance || []).find(item => item.month === month) || { lateMinutes: 0, score: 100 });
    return {
      month,
      late: rows.reduce((sum, row) => sum + Number(row.lateMinutes || 0), 0),
      score: rows.length ? rows.reduce((sum, row) => sum + Number(row.score || 0), 0) / rows.length : 0
    };
  });
  const isLate = chartMetric === 'late';
  const values = monthly.map(item => isLate ? item.late : item.score);
  const max = isLate ? Math.max(1, ...values) : 100;
  const latest = values.length ? values[values.length - 1] : 0;
  const previous = values.length > 1 ? values[values.length - 2] : null;
  const delta = previous == null ? null : latest - previous;
  const average = values.length ? values.reduce((sum, value) => sum + value, 0) / values.length : 0;
  const unit = isLate ? 'นาที' : 'คะแนน';
  const bars = monthly.map(item => {
    const value = isLate ? item.late : item.score;
    const height = value ? Math.max(5, Math.min(100, value / max * 100)) : 2;
    const aria = formatMonth(item.month) + ' ' + numberText(value) + ' ' + unit;
    return '<div class="month-column">' +
      '<button class="chart-point ' + (isLate ? 'late' : 'score-mode') + '" type="button" aria-label="' + attr(aria) + '">' +
        '<span class="chart-value">' + numberText(value) + '</span>' +
        '<span class="chart-bar-shell"><span class="chart-bar" style="height:' + height + '%"></span></span>' +
        '<span class="chart-tooltip" role="tooltip"><b>' + esc(formatMonth(item.month)) + '</b><span>' + numberText(value) + ' ' + unit + '</span></span>' +
      '</button>' +
      '<span class="month-label">' + esc(formatMonthShort(item.month)) + '</span>' +
    '</div>';
  }).join('');
  const deltaClass = delta == null || delta === 0 ? 'neutral' : ((isLate ? delta < 0 : delta > 0) ? 'good' : 'bad');
  const deltaText = delta == null ? 'ยังไม่มีเดือนก่อนหน้า' : (delta === 0 ? 'เท่ากับเดือนก่อน' : (delta > 0 ? '+' : '') + numberText(delta) + ' จากเดือนก่อน');
  const rangeCount = months.length;

  return '<section class="panel glass monthly-panel">' +
    '<div class="panel-head chart-heading"><div><p class="eyebrow">MONTHLY COMPARISON</p><h2>เปรียบเทียบรายเดือน</h2><p class="panel-subtitle">แนวโน้มตามช่วงเวลาและพนักงานที่เลือก</p></div>' +
      '<div class="chart-controls" aria-label="ตัวเลือกกราฟ">' +
        '<div class="range-pills" aria-label="ช่วงย้อนหลัง">' + [3,6,12].map(count => '<button class="mini-pill ' + (rangeCount === count ? 'active' : '') + '" type="button" onclick="setMonthRange(' + count + ')">' + count + ' เดือน</button>').join('') + '</div>' +
        '<div class="segmented" role="group" aria-label="ข้อมูลที่แสดง">' +
          '<button class="' + (isLate ? 'active' : '') + '" type="button" onclick="setChartMetric(\'late\')">เวลาสาย</button>' +
          '<button class="' + (!isLate ? 'active' : '') + '" type="button" onclick="setChartMetric(\'score\')">คะแนนเฉลี่ย</button>' +
        '</div>' +
      '</div></div>' +
    '<div class="chart-summary"><div><span>เดือนล่าสุด</span><strong>' + numberText(latest) + ' <small>' + unit + '</small></strong><em class="trend ' + deltaClass + '">' + esc(deltaText) + '</em></div>' +
      '<div><span>เฉลี่ยต่อเดือน</span><strong>' + numberText(average) + ' <small>' + unit + '</small></strong><em>' + rangeCount + ' เดือนที่เลือก</em></div></div>' +
    '<div class="chart-scroll" tabindex="0" aria-label="กราฟเปรียบเทียบ' + (isLate ? 'เวลาสาย' : 'คะแนน') + 'รายเดือน"><div class="chart-stage">' +
      '<div class="chart-grid-lines"><span></span><span></span><span></span><span></span></div>' +
      '<div class="chart-columns">' + (bars || '<p class="empty">เลือกช่วงเวลาเพื่อดูกราฟรายเดือน</p>') + '</div>' +
    '</div></div>' +
  '</section>';
}

function setChartMetric(metric) {
  chartMetric = metric === 'score' ? 'score' : 'late';
  renderDashboard();
  icons();
}

function setMonthRange(count) {
  const now = new Date();
  byId('startDateFilter').value = localDate(new Date(now.getFullYear(), now.getMonth() - count + 1, 1));
  byId('endDateFilter').value = localDate(new Date(now.getFullYear(), now.getMonth() + 1, 0));
  load();
}

function filterEmployee(id) {
  byId('employeeFilter').value = id;
  load();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function renderEmployees() {
  const employees = data.employees || [];
  const rows = employees.map(emp =>
    '<tr>' +
      '<td class="person">' + esc(emp.name) + '</td>' +
      '<td>' + formatDate(emp.startDate) + '</td>' +
      '<td><span class="pill">' + emp.lateMinutes + ' นาที</span></td>' +
      '<td><span class="score ' + scoreClass(emp.attendanceScore) + '">' + numberText(emp.attendanceScore) + ' คะแนน</span></td>' +
      '<td>' + numberText(emp.remaining.sick) + ' วัน</td>' +
      '<td>' + numberText(emp.remaining.personal) + ' วัน</td>' +
      '<td>' + numberText(emp.remaining.vacation) + ' / ' + numberText(emp.vacationEntitlement) + ' วัน</td>' +
      '<td><div class="actions">' +
        '<button class="icon-btn" type="button" title="แก้ไข" aria-label="แก้ไข ' + attr(emp.name) + '" onclick="editEmployee(\'' + js(emp.id) + '\')"><i data-lucide="pencil"></i></button>' +
        '<button class="icon-btn delete" type="button" title="ลบ" aria-label="ลบ ' + attr(emp.name) + '" onclick="removeEmployee(\'' + js(emp.id) + '\')"><i data-lucide="trash-2"></i></button>' +
      '</div></td>' +
    '</tr>'
  ).join('');

  byId('employees').innerHTML =
    '<section class="panel glass"><div class="panel-head"><h2>ข้อมูลพนักงาน</h2><span class="tag">' + employees.length + ' คน</span></div>' +
    '<div class="table-wrap"><table class="data-table"><thead><tr><th>พนักงาน</th><th>เริ่มงาน</th><th>มาสาย</th><th>คะแนนเฉลี่ย/เดือน</th><th>ลาป่วยคงเหลือ</th><th>ลากิจคงเหลือ</th><th>พักร้อนคงเหลือ</th><th></th></tr></thead>' +
    '<tbody>' + (rows || '<tr><td colspan="8" class="empty">ไม่พบพนักงานตามตัวกรอง</td></tr>') + '</tbody></table></div></section>';
}

function renderRecords() {
  const records = data.records || [];
  const typeNames = { sick: 'ลาป่วย', personal: 'ลากิจ', vacation: 'พักร้อน', other: 'ลาอื่น ๆ' };
  const rows = records.map(record => {
    const isAttendance = record.kind === 'attendance';
    const type = isAttendance ? '<span class="pill">มาสาย</span>' : '<span class="pill leave">' + (typeNames[record.type] || 'วันลา') + '</span>';
    const detail = isAttendance
      ? numberText(record.lateMinutes) + ' นาที<br><span class="score ' + scoreClass(record.score) + '">' + numberText(record.score) + ' คะแนน</span>'
      : numberText(record.days) + ' วัน' + (record.note ? '<br><small>' + esc(record.note) + '</small>' : '');
    return '<tr>' +
      '<td>' + (isAttendance ? formatMonth(record.date) : formatDate(record.date)) + '</td>' +
      '<td class="person">' + esc(record.employeeName) + '</td>' +
      '<td>' + type + '</td>' +
      '<td>' + detail + '</td>' +
      '<td><div class="actions">' +
        '<button class="icon-btn" type="button" title="แก้ไข" aria-label="แก้ไขรายการ" onclick="editRecord(\'' + js(record.kind) + '\',\'' + js(record.id) + '\')"><i data-lucide="pencil"></i></button>' +
        '<button class="icon-btn delete" type="button" title="ลบ" aria-label="ลบรายการ" onclick="removeRecord(\'' + js(record.kind) + '\',\'' + js(record.id) + '\')"><i data-lucide="trash-2"></i></button>' +
      '</div></td>' +
    '</tr>';
  }).join('');

  byId('records').innerHTML =
    '<section class="panel glass"><div class="panel-head"><h2>รายการในช่วงที่เลือก</h2><button class="btn primary" type="button" onclick="openModal(\'recordModal\')"><i data-lucide="clipboard-plus"></i>เพิ่มรายการ</button></div>' +
    '<div class="table-wrap"><table class="data-table"><thead><tr><th>วันที่ / เดือน</th><th>พนักงาน</th><th>ประเภท</th><th>รายละเอียด</th><th></th></tr></thead>' +
    '<tbody>' + (rows || '<tr><td colspan="5" class="empty">ยังไม่มีรายการในช่วงเวลานี้</td></tr>') + '</tbody></table></div></section>';
}

function editEmployee(id) {
  const employee = (data.employeeOptions || []).find(item => item.id === id);
  if (!employee) return toast('ไม่พบข้อมูลพนักงาน');
  byId('editModalTitle').textContent = 'แก้ไขข้อมูลพนักงาน';
  byId('editForm').onsubmit = updateEmployeeFromEdit;
  byId('editForm').innerHTML =
    '<input type="hidden" name="id" value="' + attr(employee.id) + '">' +
    '<label>ชื่อ-นามสกุล<input name="name" required value="' + attr(employee.name) + '"></label>' +
    '<label>วันที่เริ่มงาน<input name="startDate" type="date" required value="' + attr(employee.startDate) + '"></label>' +
    '<button class="btn primary" type="submit"><i data-lucide="save"></i>บันทึกการแก้ไข</button>';
  openModal('editModal');
}

function editRecord(kind, id) {
  const record = (data.records || []).find(item => item.kind === kind && item.id === id);
  if (!record) return toast('ไม่พบรายการ');
  const employeeSelect = employeeOptionsHtml(record.employeeId);
  byId('editForm').onsubmit = kind === 'attendance' ? updateAttendanceFromEdit : updateLeaveFromEdit;
  if (kind === 'attendance') {
    byId('editModalTitle').textContent = 'แก้ไขยอดรวมเวลาสายรายเดือน';
    byId('editForm').innerHTML =
      '<input type="hidden" name="id" value="' + attr(record.id) + '">' +
      '<label>พนักงาน<select name="employeeId" required>' + employeeSelect + '</select></label>' +
      '<label>เดือน<input name="month" type="month" required value="' + attr(String(record.date).slice(0, 7)) + '"></label>' +
      '<label>เวลาสายรวมทั้งเดือน (นาที)<input name="lateMinutes" type="number" min="0" step="1" required value="' + numberText(record.lateMinutes) + '"><small class="field-hint">คะแนนคำนวณอัตโนมัติตามยอดรวมของเดือนนี้</small></label>' +
      '<button class="btn primary" type="submit"><i data-lucide="save"></i>บันทึกการแก้ไข</button>';
  } else {
    byId('editModalTitle').textContent = 'แก้ไขวันลา';
    byId('editForm').innerHTML =
      '<input type="hidden" name="id" value="' + attr(record.id) + '">' +
      '<label>พนักงาน<select name="employeeId" required>' + employeeSelect + '</select></label>' +
      '<label>วันที่<input name="date" type="date" required value="' + attr(record.date) + '"></label>' +
      '<label>ประเภทการลา<select name="type" required>' +
        leaveOption('sick', 'ลาป่วย', record.type) + leaveOption('personal', 'ลากิจ', record.type) +
        leaveOption('vacation', 'พักร้อน', record.type) + leaveOption('other', 'ลาอื่น ๆ', record.type) +
      '</select></label>' +
      '<label>จำนวนวัน<input name="days" type="number" min="0.5" step="0.5" required value="' + numberText(record.days) + '"></label>' +
      '<label>หมายเหตุ<textarea name="note" rows="2">' + esc(record.note || '') + '</textarea></label>' +
      '<button class="btn primary" type="submit"><i data-lucide="save"></i>บันทึกการแก้ไข</button>';
  }
  openModal('editModal');
}

function saveEmployee(event) {
  event.preventDefault();
  submit('saveEmployee', formPayload(event.target), event.target, 'บันทึกพนักงานเรียบร้อย');
}
function saveAttendance(event) {
  event.preventDefault();
  submit('saveAttendance', formPayload(event.target), event.target, 'บันทึกยอดรวมเวลาสายรายเดือนเรียบร้อย');
}
function saveLeave(event) {
  event.preventDefault();
  submit('saveLeave', formPayload(event.target), event.target, 'บันทึกวันลาเรียบร้อย');
}
function updateEmployeeFromEdit(event) {
  event.preventDefault();
  submit('saveEmployee', formPayload(event.target), null, 'แก้ไขพนักงานเรียบร้อย', 'editModal');
}
function updateAttendanceFromEdit(event) {
  event.preventDefault();
  submit('saveAttendance', formPayload(event.target), null, 'แก้ไขยอดรวมเวลาสายรายเดือนเรียบร้อย', 'editModal');
}
function updateLeaveFromEdit(event) {
  event.preventDefault();
  submit('saveLeave', formPayload(event.target), null, 'แก้ไขวันลาเรียบร้อย', 'editModal');
}

function removeEmployee(id) {
  const employee = (data.employeeOptions || []).find(item => item.id === id);
  if (!employee) return;
  if (!confirm('ลบ ' + employee.name + ' พร้อมรายการเวลาสายและวันลาทั้งหมดใช่หรือไม่?')) return;
  callMutation('deleteEmployee', { employeeId: id, filters: getFilters() }, 'ลบพนักงานและรายการที่เกี่ยวข้องแล้ว');
}

function removeRecord(kind, id) {
  if (!confirm('ลบรายการนี้ใช่หรือไม่?')) return;
  callMutation('deleteRecord', { kind, id, filters: getFilters() }, 'ลบรายการเรียบร้อย');
}

function submit(functionName, payload, form, message, modalId) {
  payload.filters = getFilters();
  callMutation(functionName, payload, message, () => {
    if (form) {
      form.reset();
      form.querySelectorAll('input[name="date"]').forEach(input => input.value = localDate(new Date()));
      form.querySelectorAll('input[name="month"]').forEach(input => input.value = localMonth(new Date()));
    }
    closeModal(modalId || 'recordModal');
  });
}

function callMutation(functionName, payload, message, afterSuccess) {
  if (!hasServer()) return toast('การบันทึกใช้ได้เมื่อเปิดผ่าน Google Apps Script');
  setLoading(true);
  google.script.run
    .withSuccessHandler(result => {
      data = result;
      syncFilters();
      render();
      setLoading(false);
      if (afterSuccess) afterSuccess();
      toast(message);
    })
    .withFailureHandler(error => {
      setLoading(false);
      toast(errorMessage(error));
    })[functionName](payload);
}

function fillEmployees() {
  document.querySelectorAll('.employee-select').forEach(select => {
    const selected = select.value;
    select.innerHTML = '<option value="">เลือกพนักงาน</option>' + employeeOptionsHtml(selected);
    select.value = selected;
  });
}

function employeeOptionsHtml(selected) {
  return (data.employeeOptions || []).map(emp =>
    '<option value="' + attr(emp.id) + '"' + (emp.id === selected ? ' selected' : '') + '>' + esc(emp.name) + '</option>'
  ).join('');
}

function leaveOption(value, label, selected) {
  return '<option value="' + value + '"' + (value === selected ? ' selected' : '') + '>' + label + '</option>';
}

function openModal(id) {
  fillEmployees();
  byId(id).classList.add('open');
  document.body.style.overflow = 'hidden';
  icons();
  const first = byId(id).querySelector('input:not([type="hidden"]),select,textarea,button');
  if (first) setTimeout(() => first.focus(), 30);
}

function closeModal(id) {
  byId(id).classList.remove('open');
  if (!document.querySelector('.modal.open')) document.body.style.overflow = '';
}

function switchForm(button) {
  button.closest('.modal-card').querySelectorAll('.tab,.form').forEach(element => element.classList.remove('active'));
  button.classList.add('active');
  byId(button.dataset.form).classList.add('active');
}

function showView(id, button) {
  activeView = id;
  document.querySelectorAll('.view,.nav').forEach(element => element.classList.remove('active'));
  byId(id).classList.add('active');
  (button || document.querySelector('[data-view="' + id + '"]')).classList.add('active');
  const titles = { dashboard: 'ภาพรวมการทำงาน', employees: 'ข้อมูลพนักงาน', records: 'บันทึกข้อมูล' };
  byId('pageTitle').textContent = titles[id];
  icons();
}

function exportCsv() {
  const rows = [
    ['พนักงาน','วันที่เริ่มงาน','มาสาย (นาที)','คะแนนเวลาสายเฉลี่ยต่อเดือน','ลาป่วยคงเหลือ','ลากิจคงเหลือ','พักร้อนคงเหลือ'],
    ...(data.employees || []).map(emp => [emp.name, emp.startDate, emp.lateMinutes, emp.attendanceScore, emp.remaining.sick, emp.remaining.personal, emp.remaining.vacation])
  ];
  const csv = '\ufeff' + rows.map(row => row.map(csvCell).join(',')).join('\r\n');
  const link = document.createElement('a');
  link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
  link.download = 'workday-insight-' + getFilters().startDate + '-to-' + getFilters().endDate + '.csv';
  link.click();
  URL.revokeObjectURL(link.href);
  toast('ส่งออกไฟล์สรุปเรียบร้อย');
}

function periodText() {
  const filters = data.filters || getFilters();
  return formatDate(filters.startDate) + ' – ' + formatDate(filters.endDate);
}

function formPayload(form) {
  return Object.fromEntries(new FormData(form).entries());
}

function setLoading(show) {
  byId('loading').classList.toggle('show', Boolean(show));
  byId('loading').setAttribute('aria-hidden', show ? 'false' : 'true');
}

function toast(message) {
  const element = byId('toast');
  element.textContent = message;
  element.classList.add('show');
  clearTimeout(toast.timer);
  toast.timer = setTimeout(() => element.classList.remove('show'), 3500);
}

function hasServer() {
  return typeof google !== 'undefined' && google.script && google.script.run;
}
function icons() {
  if (typeof lucide !== 'undefined') lucide.createIcons();
}
function errorMessage(error) {
  return error && error.message ? error.message : 'เกิดข้อผิดพลาด กรุณาลองใหม่';
}
function localDate(date) {
  const offset = date.getTimezoneOffset();
  return new Date(date.getTime() - offset * 60000).toISOString().slice(0,10);
}
function localMonth(date) {
  return localDate(date).slice(0, 7);
}
function formatDate(value) {
  if (!value) return '-';
  const parts = String(value).slice(0,10).split('-').map(Number);
  return new Intl.DateTimeFormat('th-TH', { day: 'numeric', month: 'short', year: 'numeric' }).format(new Date(parts[0], parts[1] - 1, parts[2]));
}
function formatMonth(value) {
  if (!value) return '-';
  const parts = String(value).slice(0, 7).split('-').map(Number);
  return new Intl.DateTimeFormat('th-TH', { month: 'long', year: 'numeric' }).format(new Date(parts[0], parts[1] - 1, 1));
}
function formatMonthShort(value) {
  if (!value) return '-';
  const parts = String(value).slice(0, 7).split('-').map(Number);
  return new Intl.DateTimeFormat('th-TH', { month: 'short' }).format(new Date(parts[0], parts[1] - 1, 1));
}
function clientMonths(startDate, endDate) {
  if (!startDate || !endDate) return [];
  const start = String(startDate).slice(0, 7).split('-').map(Number);
  const end = String(endDate).slice(0, 7).split('-').map(Number);
  const months = [];
  let year = start[0];
  let month = start[1];
  while (year < end[0] || (year === end[0] && month <= end[1])) {
    months.push(year + '-' + String(month).padStart(2, '0'));
    month++;
    if (month > 12) {
      month = 1;
      year++;
    }
  }
  return months;
}
function numberText(value) {
  return Number(value || 0).toLocaleString('th-TH', { maximumFractionDigits: 1 });
}
function scoreClass(score) {
  if (Number(score) >= 90) return '';
  if (Number(score) >= 80) return 'mid';
  return 'low';
}
function esc(value) {
  return String(value == null ? '' : value).replace(/[&<>"']/g, char => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[char]));
}
function attr(value) { return esc(value); }
function js(value) { return String(value).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function csvCell(value) { return '"' + String(value == null ? '' : value).replace(/"/g,'""') + '"'; }

function lateScoreClient(lateMinutes) {
  const minutes = Math.max(0, Number(lateMinutes) || 0);
  if (minutes < 30) return 100;
  if (minutes < 60) return 90;
  if (minutes < 90) return 80;
  if (minutes < 120) return 70;
  return 60;
}

function sample(filters) {
  const options = [
    { id: 'E001', name: 'กัญญารัตน์ รุ่งเรือง', startDate: '2021-02-15' },
    { id: 'E002', name: 'ณัฐพล ใจดี', startDate: '2024-06-01' },
    { id: 'E003', name: 'พิมพ์ชนก วัฒนกุล', startDate: '2018-04-10' }
  ];
  const monthKeys = clientMonths(filters.startDate, filters.endDate);
  const patterns = [[12, 28, 18, 42, 9, 18, 24, 15, 34, 11, 20, 8], [48, 65, 39, 72, 58, 44, 81, 52, 68, 43, 59, 36], [22, 35, 14, 27, 41, 19, 32, 24, 38, 17, 29, 12]];
  const leaveData = [
    { used: { sick: 2, personal: 1, vacation: 3, other: 0 }, remaining: { sick: 28, personal: 4, vacation: 5 }, vacationEntitlement: 8 },
    { used: { sick: 0, personal: 2, vacation: 0, other: 1 }, remaining: { sick: 30, personal: 3, vacation: 0 }, vacationEntitlement: 0 },
    { used: { sick: 4, personal: 0, vacation: 6, other: 0 }, remaining: { sick: 26, personal: 5, vacation: 4 }, vacationEntitlement: 10 }
  ];
  const employees = options.map((option, employeeIndex) => {
    const monthlyAttendance = monthKeys.map((month, monthIndex) => {
      const lateMinutes = patterns[employeeIndex][monthIndex % patterns[employeeIndex].length];
      return { month, lateMinutes, score: lateScoreClient(lateMinutes) };
    });
    const lateMinutes = monthlyAttendance.reduce((sum, item) => sum + item.lateMinutes, 0);
    const attendanceScore = monthlyAttendance.length ? monthlyAttendance.reduce((sum, item) => sum + item.score, 0) / monthlyAttendance.length : 100;
    return { ...option, ...leaveData[employeeIndex], lateMinutes, attendanceScore, monthlyAttendance };
  }).filter(emp => !filters.employeeId || emp.id === filters.employeeId);
  return {
    filters,
    employeeOptions: options,
    employees,
    records: [
      { id: 'R1', kind: 'attendance', date: filters.endDate.slice(0, 7) + '-01', employeeId: 'E002', employeeName: 'ณัฐพล ใจดี', lateMinutes: 72, score: 80 },
      { id: 'R2', kind: 'leave', date: filters.endDate, employeeId: 'E001', employeeName: 'กัญญารัตน์ รุ่งเรือง', type: 'vacation', days: 1, note: 'ธุระส่วนตัว' }
    ],
    summary: {
      total: employees.length,
      lateMinutes: employees.reduce((sum, emp) => sum + emp.lateMinutes, 0),
      leaveDays: employees.reduce((sum, emp) => sum + Object.values(emp.used).reduce((a,b) => a+b, 0), 0),
      attendanceScore: employees.length ? employees.reduce((sum, emp) => sum + emp.attendanceScore, 0) / employees.length : 0
    }
  };
}
