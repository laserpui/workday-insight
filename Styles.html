<style>
:root {
  --ink: #17233d;
  --muted: #6f7e98;
  --primary: #5b5ce2;
  --primary-dark: #4546c5;
  --danger: #d34a5b;
  --line: rgba(255,255,255,.72);
  --glass: rgba(255,255,255,.62);
  --shadow: 0 18px 50px rgba(58,75,120,.11);
}
* { box-sizing: border-box; }
html { min-width: 320px; }
body {
  margin: 0;
  min-height: 100vh;
  font: 400 16px/1.5 Sarabun, sans-serif;
  color: var(--ink);
  background: linear-gradient(125deg,#e5ffff 0%,#ffffe6 48%,#ffe6ff 100%);
}
button,input,select,textarea { font: inherit; }
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible {
  outline: 3px solid rgba(91,92,226,.24);
  outline-offset: 2px;
}
.ambient { position: fixed; border-radius: 50%; filter: blur(70px); opacity: .35; z-index: -1; }
.ambient.a { width: 350px; height: 350px; background: #78dfff; top: -100px; right: 3%; }
.ambient.b { width: 280px; height: 280px; background: #e9a1ff; bottom: -70px; left: 30%; }
.glass { background: var(--glass); border: 1px solid var(--line); box-shadow: var(--shadow); backdrop-filter: blur(18px); }
.app-shell { max-width: 1500px; margin: auto; padding: 24px; display: flex; gap: 24px; }
.sidebar { width: 254px; min-height: calc(100vh - 48px); padding: 24px 16px; border-radius: 28px; display: flex; flex-direction: column; }
.brand { display: flex; gap: 12px; align-items: center; line-height: 1.05; font-size: 17px; }
.brand-icon { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 14px; background: linear-gradient(135deg,#6366e9,#aa65df); color: #fff; font-weight: 800; font-size: 21px; }
nav { margin-top: 45px; display: grid; gap: 7px; }
.nav { border: 0; background: transparent; padding: 13px 14px; border-radius: 14px; color: #51617a; text-align: left; font-weight: 600; display: flex; gap: 13px; align-items: center; cursor: pointer; transition: .2s; }
.nav:hover,.nav.active { background: rgba(255,255,255,.72); color: #4243bf; transform: translateX(3px); }
.nav svg,.sidebar-foot svg { width: 19px; }
.sidebar-foot { margin-top: auto; color: #687891; font-size: 12px; display: flex; gap: 6px; align-items: center; }
.content { min-width: 0; flex: 1; padding: 20px 8px; }
header { display: flex; justify-content: space-between; align-items: center; gap: 18px; margin-bottom: 20px; }
.eyebrow { font-size: 12px; font-weight: 800; letter-spacing: 1.4px; color: #6a71bd; margin: 0 0 3px; }
h1 { font-size: clamp(25px,3vw,31px); margin: 0; line-height: 1.2; }
h2 { font-size: 21px; margin: 0 0 16px; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.btn { border-radius: 13px; border: 1px solid rgba(73,80,160,.12); padding: 10px 14px; cursor: pointer; transition: .2s; display: inline-flex; justify-content: center; align-items: center; gap: 7px; font-weight: 600; }
.btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(64,79,155,.16); }
.btn:disabled { cursor: wait; opacity: .65; }
.btn svg { width: 17px; }
.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.primary:hover:not(:disabled) { background: var(--primary-dark); }
.outline { background: rgba(255,255,255,.72); color: #45516d; }
.danger { background: #fff1f3; color: var(--danger); border-color: #ffd4da; }
.filter-bar { border-radius: 21px; padding: 13px 14px; margin-bottom: 18px; display: flex; align-items: end; gap: 10px; }
.filter-bar label { min-width: 145px; }
.filter-bar label > span { display: block; margin-bottom: 4px; }
.filter-label { align-self: center; display: flex; align-items: center; gap: 7px; font-weight: 800; color: #5254bd; padding: 0 7px 0 2px; }
.filter-label svg { width: 19px; }
.employee-filter { min-width: 210px !important; flex: 1; }
.range-separator { color: var(--muted); align-self: center; padding-top: 18px; }
.filter-apply { min-height: 44px; }
input,select,textarea { width: 100%; padding: 10px 11px; border: 1px solid #dce0eb; border-radius: 11px; background: rgba(255,255,255,.76); color: var(--ink); }
textarea { resize: vertical; }
.view { display: none; }
.view.active { display: block; }
.metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 18px; }
.metric { padding: 19px; border-radius: 23px; transition: .2s; }
.metric:hover { transform: translateY(-3px); }
.metric-top { display: flex; justify-content: space-between; color: var(--muted); font-weight: 600; }
.metric-icon { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 12px; background: #edf0ff; color: var(--primary); }
.metric-icon svg { width: 18px; }
.metric strong { font-size: 29px; display: block; margin: 12px 0 2px; }
.metric small { color: var(--muted); }
.grid { display: grid; grid-template-columns: 1.35fr .85fr; gap: 18px; }
.panel { border-radius: 25px; padding: 22px; }
.panel-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 15px; }
.panel-head h2 { margin: 0; }
.tag { background: #edf0ff; color: #5556c7; border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 700; white-space: nowrap; }
.bar-list { display: grid; gap: 17px; }
.bar-row { display: grid; grid-template-columns: minmax(110px,145px) 1fr 55px; align-items: center; gap: 8px; font-size: 14px; }
.bar-row b:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar { height: 9px; background: #eceff5; border-radius: 10px; overflow: hidden; }
.bar span { display: block; height: 100%; border-radius: 10px; background: linear-gradient(90deg,#7374eb,#c171e4); }
.leave-summary { display: grid; gap: 10px; }
.leave-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 16px; background: rgba(255,255,255,.58); }
.leave-item span { color: var(--muted); }
.leave-item small { display: block; }
.table-wrap { overflow: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 720px; }
.data-table th { text-align: left; color: var(--muted); font-size: 12px; padding: 8px 10px; white-space: nowrap; }
.data-table td { padding: 13px 10px; border-top: 1px solid rgba(111,123,150,.13); vertical-align: middle; }
.person { font-weight: 700; }
.pill { display: inline-block; padding: 4px 8px; border-radius: 99px; background: #f0edff; color: #655bb7; font-size: 12px; font-weight: 700; white-space: nowrap; }
.pill.leave { background: #e9fbf2; color: #287557; }
.actions { display: flex; gap: 6px; justify-content: flex-end; }
.icon-btn { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 10px; border: 1px solid #dde1ec; background: rgba(255,255,255,.75); color: #57647e; cursor: pointer; }
.icon-btn:hover { color: var(--primary); border-color: #babcf2; }
.icon-btn.delete:hover { color: var(--danger); border-color: #ffc5ce; background: #fff4f5; }
.icon-btn svg { width: 16px; }
.empty { color: var(--muted); padding: 28px 5px; text-align: center; }
.ai-card { padding: 27px; border-radius: 25px; background: linear-gradient(130deg,rgba(74,76,205,.96),rgba(158,75,196,.92)); color: #fff; overflow: hidden; }
.ai-card .eyebrow { color: #fff; }
.ai-head { display: flex; justify-content: space-between; align-items: start; gap: 16px; }
.ai-card p { opacity: .9; line-height: 1.7; }
.ai-status { background: rgba(255,255,255,.16); border-radius: 999px; padding: 5px 10px; font-size: 12px; font-weight: 700; white-space: nowrap; }
.ai-controls { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 20px; }
.ai-controls textarea { min-height: 76px; }
.ai-controls .btn { align-self: stretch; }
.ai-result { margin-top: 18px; padding: 18px; border: 1px solid rgba(255,255,255,.18); border-radius: 16px; background: rgba(255,255,255,.12); white-space: pre-wrap; line-height: 1.75; }
.ai-note { font-size: 13px; color: rgba(255,255,255,.82); }
.modal { position: fixed; inset: 0; background: rgba(25,30,58,.32); display: none; place-items: center; padding: 18px; z-index: 10; }
.modal.open { display: grid; }
.modal-card { width: min(500px,100%); max-height: calc(100vh - 36px); overflow-y: auto; border-radius: 28px; padding: 26px; position: relative; }
.close { position: absolute; right: 17px; top: 13px; background: transparent; border: 0; font-size: 27px; color: #71809a; cursor: pointer; }
.tab-row { display: flex; gap: 6px; border-bottom: 1px solid #e5e7ee; margin-bottom: 18px; }
.tab { padding: 8px 10px; border: 0; background: none; color: #71809a; font-weight: 600; cursor: pointer; }
.tab.active { color: #5254cc; border-bottom: 2px solid #5254cc; }
.form { display: none; gap: 12px; }
.form.active { display: grid; }
label { font-size: 13px; font-weight: 700; color: #52617b; }
.form label { display: grid; gap: 5px; }
.form .btn { margin-top: 6px; }
.toast { position: fixed; bottom: 24px; right: 24px; max-width: min(420px,calc(100vw - 30px)); background: #243250; color: #fff; padding: 12px 16px; border-radius: 13px; opacity: 0; transform: translateY(12px); transition: .25s; pointer-events: none; z-index: 20; }
.toast.show { opacity: 1; transform: none; }
.loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.2); z-index: 15; place-items: center; }
.loading.show { display: grid; }
.loading span { width: 42px; height: 42px; border: 4px solid rgba(91,92,226,.18); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 1050px) {
  .filter-bar { flex-wrap: wrap; }
  .filter-label { width: 100%; }
  .filter-bar label { flex: 1; }
  .metrics { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 900px) {
  .sidebar { width: 78px; padding: 20px 11px; }
  .brand span:not(.brand-icon),.nav span { display: none; }
  .nav { justify-content: center; }
  .nav svg { width: 21px; height: 21px; }
  .sidebar-foot { display: none; }
  .grid { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .app-shell { padding: 10px; display: block; }
  .sidebar { position: fixed; bottom: 10px; left: 10px; right: 10px; width: auto; min-height: 64px; height: 64px; padding: 8px 12px; border-radius: 20px; z-index: 8; flex-direction: row; align-items: center; }
  .brand { display: none; }
  nav { margin: 0; grid-template-columns: repeat(4,1fr); width: 100%; gap: 2px; }
  .nav { padding: 9px; justify-content: center; }
  .content { padding: 15px 4px 85px; }
  header { align-items: flex-start; flex-direction: column; }
  .header-actions { width: 100%; }
  .header-actions .btn { flex: 1; }
  .filter-bar { align-items: end; gap: 8px; }
  .filter-bar label { min-width: calc(50% - 18px); }
  .range-separator { display: none; }
  .employee-filter { min-width: 100% !important; }
  .filter-apply { width: 100%; }
  .metrics { gap: 10px; }
  .metric { padding: 15px; }
  .metric strong { font-size: 24px; }
  .panel { padding: 17px; }
  .bar-row { grid-template-columns: 95px 1fr 40px; font-size: 12px; }
  .ai-card { padding: 21px; }
  .ai-head { display: block; }
  .ai-status { display: inline-block; margin-bottom: 12px; }
  .ai-controls { grid-template-columns: 1fr; }
}
</style>
